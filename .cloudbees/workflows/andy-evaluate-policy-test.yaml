apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: andy-evaluate-policy-test
on:
  workflow_dispatch:
    inputs:
      critical:
        type: number
        default: 0
      high:
        type: number
        default: 0
      medium:
        type: number
        default: 0
      low:
        type: number
        default: 0  
      policy:
        type: string
        default: ""
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  check:
    steps:
      - name: Build a test policy subject
        uses: docker://alpine:latest
        shell: sh
        run: |
          CRITICAL=0
          HIGH=0
          MEDIUM=0
          LOW=0
          TOTAL=$(( $CRITICAL + $HIGH + $MEDIUM + $LOW ))
          cat > "$CLOUDBEES_OUTPUTS/policy-subject" << EOF
          [{
            "type": "vulnerability_scan_summary",
            "data": {
              "summary": {
                "by_severity": {
                  "total": ${TOTAL},
                  "critical": ${CRITICAL},
                  "high": ${HIGH},
                  "medium": ${MEDIUM},
                  "low": ${LOW}
                }
              }
            },
            "findings": [
              {
                "code": "CWE-22",
                "severity": "MEDIUM",
                "location": "/zip_extract.go#L13"
              },
              {
                "code": "CWE-703",
                "severity": "LOW",
                "location": "/main.go#L31"
              }
            ]  
          }]
          EOF
      - name: Print test input
        uses: docker://alpine:latest
        shell: sh
        run: |
          cat "$CLOUDBEES_OUTPUTS/policy-subject"
      - id: check-vulnerabilities
        name: Check vulnerabilities
        uses: cloudbees-io/policy-check
        with:
          policy: ${{ inputs.policy }}
          input-file: "$CLOUDBEES_OUTPUTS/policy-subject"
